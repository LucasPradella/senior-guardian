<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SeniorGuardian — Acesse sua conta e monitore a proteção dos seus pais contra fraudes financeiras.">
  <meta name="theme-color" content="#0F172A">
  <title>Login — SeniorGuardian</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- Design System CSS -->
  <link rel="stylesheet" href="/src/styles/variables.css">
  <link rel="stylesheet" href="/src/styles/global.css">
  <link rel="stylesheet" href="/src/styles/landing.css">
</head>
<body class="auth-body">

  <div class="auth-container">
    <!-- Brand -->
    <a href="/" class="auth-brand">
      <svg class="auth-brand__logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#60A5FA"/>
            <stop offset="100%" style="stop-color:#3B82F6"/>
          </linearGradient>
        </defs>
        <path d="M32 4 L56 16 V36 C56 50 32 60 32 60 C32 60 8 50 8 36 V16 Z" fill="url(#logoGrad)" opacity="0.9"/>
        <path d="M24 32 L30 38 L40 26" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="auth-brand__name">SeniorGuardian</span>
    </a>

    <!-- Login Card -->
    <div class="glass auth-card">
      <h1 class="auth-card__title">Bem-vindo de volta</h1>
      <p class="auth-card__subtitle">Acesse seu painel de proteção familiar.</p>

      <form class="auth-form" id="loginForm">
        <div class="auth-form__group">
          <label class="auth-form__label" for="loginEmail">E-mail</label>
          <input class="auth-form__input" type="email" id="loginEmail" placeholder="seu@email.com" required>
        </div>

        <div class="auth-form__group">
          <label class="auth-form__label" for="loginPassword">Senha</label>
          <input class="auth-form__input" type="password" id="loginPassword" placeholder="••••••••" required>
          <a href="#" class="auth-form__forgot" onclick="event.preventDefault();">Esqueci minha senha</a>
        </div>

        <button type="submit" class="auth-form__submit" id="btnLoginSubmit">
          Entrar
        </button>
      </form>

      <div class="auth-divider">ou</div>

      <p class="auth-footer">
        Não tem uma conta? <a href="/register.html">Criar conta grátis</a>
      </p>
    </div>
  </div>

  <!-- ═══════════ SCRIPT ═══════════ -->
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      if (email && password) {
        // Mock authentication — accept any credentials
        const btn = document.getElementById('btnLoginSubmit');
        btn.textContent = 'Autenticando...';
        btn.disabled = true;
        btn.style.opacity = '0.7';

        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 800);
      }
    });
  </script>

</body>
</html>
